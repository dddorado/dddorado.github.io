name: Sync Wiki To Site

on:
  push:
    branches:
      - main
    paths:
      - wiki.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync wiki to index
        run: python scripts/sync_wiki_to_index.py

      - name: Commit synced site changes
        run: |
          if git diff --quiet -- index.html; then
            echo "No synced changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Sync index.html from wiki.md"
          git push
